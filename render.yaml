# Render Blueprint — adopts the existing, manually-created "docs" static site.
#
# Adoption is by `name`: it MUST stay "docs" to match the live service, or Render
# will spin up a suffixed duplicate instead of updating the real one. The service
# settings below mirror the Render dashboard export.
#
# Routing note: Render applies the FIRST matching rule by priority, top to bottom
# (https://render.com/docs/redirects-rewrites). The generated specific redirects
# MUST therefore stay ABOVE the broad SPA-fallback rewrites at the bottom — else
# `/sdk/*`, `/react/*`, `/smart-wallet/*` etc. would swallow ~145 legacy URLs into
# the app shell (which then 404s). The redirect block is generated from
# redirects.config.js by `npm run sync-redirects` — edit that file, not this one.
version: "1"
services:
  - type: web
    name: docs
    runtime: static
    repo: https://github.com/zerodevapp/docs
    envVars:
      - key: VITE_POSTHOG_HOST
        sync: false
      - key: VITE_POSTHOG
        sync: false
      - key: NODE_VERSION
        sync: false
    buildCommand: bun i; bun run build
    staticPublishPath: ./docs/dist
    domains:
      - docs.zerodev.app
      - new-docs.zerodev.app
    autoDeployTrigger: commit
    routes:
      # >>> BEGIN GENERATED REDIRECTS — produced by `npm run sync-redirects`; do not edit by hand
