# TEST dynamic web service (on the fork) — validates serving the Vocs build from
# a Node web service with redirects handled in server.mjs (no 200-route cap, no
# Blueprint route merging). Standalone: fork repo, distinct name, no prod
# domains, free plan.
#
# For PROD, this becomes: name "docs", repo zerodevapp/docs, the real domains,
# and plan "starter" (always-on; the free plan spins down after 15m idle).
version: "1"
services:
  - type: web
    runtime: node
    name: docs-dynamic-test
    repo: https://github.com/a-thomas-22/docs
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
