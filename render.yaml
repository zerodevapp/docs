# Render Blueprint for the production "docs" static site.
#
# NOTE: redirect/rewrite routes are intentionally NOT defined here. Render
# Blueprints MERGE routes and never delete them, and cap a service at 200 routes
# (https://render.com/docs/blueprint-spec). A curated redirect set needs
# deletions and must stay under the cap, so routes are managed in code via
# redirects.config.js and applied with the Render API by
# scripts/sync-render-routes.mjs (run in CI — see .github/workflows/render-routes.yml).
version: "1"
services:
  - type: web
    name: docs
    runtime: static
    repo: https://github.com/zerodevapp/docs
    envVars:
      - key: VITE_POSTHOG_HOST
        sync: false
      - key: VITE_POSTHOG
        sync: false
      - key: NODE_VERSION
        sync: false
    buildCommand: bun i; bun run build
    staticPublishPath: ./docs/dist
    domains:
      - docs.zerodev.app
      - new-docs.zerodev.app
    autoDeployTrigger: commit
