# Render Blueprint for the production docs site (dynamic web service).
# Redirects are handled in server.mjs — no 200-route cap, no Blueprint route merge.
version: "1"
services:
  - type: web
    runtime: node
    name: docs-dynamic
    repo: https://github.com/zerodevapp/docs
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_POSTHOG_HOST
        sync: false
      - key: VITE_POSTHOG
        sync: false
      - key: NODE_VERSION
        sync: false
    domains:
      - docs.zerodev.app
      - new-docs.zerodev.app
    autoDeployTrigger: commit
